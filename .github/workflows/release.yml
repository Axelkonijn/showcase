name: Release (promotie naar Acceptatie & Productie)

# Build-once: bouwt en pusht de productie-images één keer naar ghcr.io.
# Diezelfde image-tag (commit-SHA) promoveert ongewijzigd D -> A -> P.
on:
  push:
    branches: [main]      # -> bouwt images en promoveert naar Acceptatie (na approval)
    tags: ["v*"]          # -> promoveert naar Productie (na approval)

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ---- Build once + publish naar ghcr.io ----
  build-and-publish:
    name: Build & publish images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API-image
        uses: docker/build-push-action@v6
        with:
          context: ./ShowcaseAPI
          file: ./ShowcaseAPI/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
            ${{ env.IMAGE_BASE }}-api:${{ github.ref_name }}

      - name: Build & push webapp-image
        uses: docker/build-push-action@v6
        with:
          context: ./ShowcaseWebApp
          file: ./ShowcaseWebApp/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-webapp:${{ github.sha }}
            ${{ env.IMAGE_BASE }}-webapp:${{ github.ref_name }}

  # ---- Gate: handmatige approval -> Acceptatie (alleen op main) ----
  deploy-acceptance:
    name: Promote naar Acceptatie
    needs: build-and-publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: acceptance   # required reviewer = de approval-gate
    steps:
      - uses: actions/checkout@v4
      - name: Promote (gesimuleerd) naar Acceptatie
        run: |
          echo "Promoveer exact deze images naar Acceptatie:"
          echo "  API:    ${IMAGE_BASE}-api:${{ github.sha }}"
          echo "  WEBAPP: ${IMAGE_BASE}-webapp:${{ github.sha }}"
          echo ""
          echo "Lokaal draaien met:"
          echo "  API_IMAGE=${IMAGE_BASE}-api:${{ github.sha }} \\"
          echo "  WEBAPP_IMAGE=${IMAGE_BASE}-webapp:${{ github.sha }} \\"
          echo "  docker compose -p showcase-acceptance -f docker-compose.acceptance.yml --env-file .env.acceptance up -d"

  # ---- Gate: handmatige approval -> Productie (alleen op een v*-tag) ----
  deploy-production:
    name: Promote naar Productie
    needs: build-and-publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production   # required reviewer = de approval-gate
    steps:
      - uses: actions/checkout@v4
      - name: Promote (gesimuleerd) naar Productie
        run: |
          echo "Promoveer EXACT dezelfde, reeds geteste image-tag naar Productie:"
          echo "  API:    ${IMAGE_BASE}-api:${{ github.sha }}"
          echo "  WEBAPP: ${IMAGE_BASE}-webapp:${{ github.sha }}"
          echo ""
          echo "Lokaal draaien met:"
          echo "  API_IMAGE=${IMAGE_BASE}-api:${{ github.sha }} \\"
          echo "  WEBAPP_IMAGE=${IMAGE_BASE}-webapp:${{ github.sha }} \\"
          echo "  docker compose -p showcase-production -f docker-compose.production.yml --env-file .env.production up -d"
