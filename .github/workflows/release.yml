name: Release (promotie naar Acceptatie & Productie)

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/axelkonijn/showcase

jobs:
  build-and-publish:
    name: Build & publish images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API-image
        uses: docker/build-push-action@v7
        with:
          context: ./ShowcaseAPI
          file: ./ShowcaseAPI/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
            ${{ env.IMAGE_BASE }}-api:main

      - name: Build & push webapp-image
        uses: docker/build-push-action@v7
        with:
          context: ./ShowcaseWebApp
          file: ./ShowcaseWebApp/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-webapp:${{ github.sha }}
            ${{ env.IMAGE_BASE }}-webapp:main

  deploy-acceptance:
    name: Promote naar Acceptatie
    needs: build-and-publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: acceptance
    steps:
      - uses: actions/checkout@v6
      - name: Promote (gesimuleerd) naar Acceptatie
        run: |
          echo "Promoveer exact deze images naar Acceptatie:"
          echo "  API:    ${IMAGE_BASE}-api:${{ github.sha }}"
          echo "  WEBAPP: ${IMAGE_BASE}-webapp:${{ github.sha }}"
          echo ""
          echo "Lokaal draaien met:"
          echo "  API_IMAGE=${IMAGE_BASE}-api:${{ github.sha }} \\"
          echo "  WEBAPP_IMAGE=${IMAGE_BASE}-webapp:${{ github.sha }} \\"
          echo "  docker compose -p showcase-acceptance -f docker-compose.acceptance.yml --env-file .env.acceptance up -d"

  # v*-tag: geen rebuild, alleen de versie-tag op de bestaande image (zelfde digest).
  deploy-production:
    name: Promote naar Productie
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag bestaande image als versie
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_BASE}-api:${{ github.ref_name }} \
            ${IMAGE_BASE}-api:${{ github.sha }}
          docker buildx imagetools create \
            -t ${IMAGE_BASE}-webapp:${{ github.ref_name }} \
            ${IMAGE_BASE}-webapp:${{ github.sha }}

      - name: Promote (gesimuleerd) naar Productie
        run: |
          echo "Promoveer EXACT dezelfde image (zelfde digest) naar Productie:"
          echo "  API:    ${IMAGE_BASE}-api:${{ github.ref_name }}"
          echo "  WEBAPP: ${IMAGE_BASE}-webapp:${{ github.ref_name }}"
          echo ""
          echo "Lokaal draaien met:"
          echo "  API_IMAGE=${IMAGE_BASE}-api:${{ github.ref_name }} \\"
          echo "  WEBAPP_IMAGE=${IMAGE_BASE}-webapp:${{ github.ref_name }} \\"
          echo "  docker compose -p showcase-production -f docker-compose.production.yml --env-file .env.production up -d"
